spring.application.name=chatapp-backend
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.url=${YIJIA_DB_URL:jdbc:h2:file:${user.home}/.yijia/data/chatappdb;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${YIJIA_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${YIJIA_DB_USERNAME:sa}
spring.datasource.password=${YIJIA_DB_PASSWORD:}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=update
spring.servlet.multipart.max-file-size=${YIJIA_MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${YIJIA_MAX_REQUEST_SIZE:20MB}

app.admin.email=admin@yijia-campus.local
app.admin.password=YijiaCampusAdmin@123
app.admin.display-name=Yijia Campus System Administrator
app.encryption.secret=Yijia-Campus-Chat-Packet-Secret
app.seed-demo-data=${YIJIA_SEED_DEMO_DATA:true}

